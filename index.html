<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修繕完了率 算出ツール</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .file-drop-area {
            transition: all 0.2s ease;
        }
        .file-drop-area.dragover {
            background-color: #f3f4f6;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans pb-20">

    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="wrench" class="text-blue-600 w-7 h-7"></i>
                <h1 class="text-2xl font-bold text-slate-800">修繕完了率 算出ツール</h1>
            </div>
            <div class="text-xs font-medium text-slate-400">
                <span>ローカルモード</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
        
        <div id="messageArea" class="hidden rounded-lg p-4 mb-6 shadow-sm border"></div>

        <!-- 1. 設定パネル -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <div class="flex items-center justify-between mb-4 pb-4 border-b border-slate-100">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5 text-purple-500"></i>
                    1. 基本設定
                </h2>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 h-full flex flex-col justify-center">
                    <label for="baseMonth" class="block text-sm font-bold text-slate-700 mb-2">「今月」として扱う基準月</label>
                    <input type="month" id="baseMonth" class="w-full border border-slate-300 rounded-md px-3 py-2.5 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-shadow bg-white">
                </div>

                <div class="relative border-2 border-dashed border-slate-300 rounded-xl p-4 flex flex-col items-center justify-center text-center file-drop-area bg-white hover:bg-slate-50 transition-colors h-full">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-8 h-8 bg-purple-100 rounded-full flex items-center justify-center">
                            <i data-lucide="sigma" class="text-purple-600 w-4 h-4"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">分母用データ (C)</h3>
                    </div>
                    <input type="file" id="fileC" accept=".xlsx, .xls" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <button class="bg-white border border-slate-300 text-slate-700 text-xs px-4 py-1.5 rounded-md font-medium shadow-sm pointer-events-none">ファイルを選択</button>
                    <p id="fileNameC" class="mt-2 text-sm text-purple-600 font-medium truncate w-full px-2 min-h-[20px]"></p>
                </div>
            </div>
        </section>

        <!-- 2. 日次データ -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 border-t-4 border-t-blue-500">
            <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <i data-lucide="file-spreadsheet" class="w-5 h-5 text-blue-500"></i>
                    2. 完了データの読み込み
                </h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="relative border-2 border-dashed border-blue-200 rounded-xl p-8 flex flex-col items-center justify-center text-center file-drop-area bg-blue-50/30 hover:bg-blue-50 transition-colors">
                    <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center mb-4 shadow-sm">
                        <span class="text-blue-600 font-bold text-2xl">A</span>
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg mb-1">10お困り事 完了数</h3>
                    <input type="file" id="fileA" accept=".xlsx, .xls" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <button class="bg-white border border-blue-300 text-blue-700 text-sm px-6 py-2.5 rounded-md font-medium shadow-sm pointer-events-none">ファイルを選択</button>
                    <p id="fileNameA" class="mt-3 text-sm text-blue-600 font-bold truncate w-full px-2 min-h-[20px]"></p>
                </div>

                <div class="relative border-2 border-dashed border-green-200 rounded-xl p-8 flex flex-col items-center justify-center text-center file-drop-area bg-green-50/30 hover:bg-green-50 transition-colors">
                    <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mb-4 shadow-sm">
                        <span class="text-green-600 font-bold text-2xl">B</span>
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg mb-1">25設備保証修繕 完了数</h3>
                    <input type="file" id="fileB" accept=".xlsx, .xls" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <button class="bg-white border border-green-300 text-green-700 text-sm px-6 py-2.5 rounded-md font-medium shadow-sm pointer-events-none">ファイルを選択</button>
                    <p id="fileNameB" class="mt-3 text-sm text-green-600 font-bold truncate w-full px-2 min-h-[20px]"></p>
                </div>
            </div>
        </section>

        <div class="flex justify-center">
            <button id="calcButton" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg flex items-center gap-2 transition-all transform hover:scale-105">
                <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                計算を実行する
            </button>
        </div>

        <!-- 結果パネル -->
        <section id="resultSection" class="hidden bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
            <div class="bg-slate-800 text-white px-6 py-4 flex items-center justify-between">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i>
                    集計結果
                </h2>
                <div id="targetMonthDisplay" class="text-sm bg-slate-700 px-3 py-1 rounded-full border border-slate-600"></div>
            </div>

            <div class="p-6">
                <div class="mb-8 bg-blue-50 rounded-xl p-6 border border-blue-100 flex flex-col md:flex-row items-center justify-between gap-6">
                    <div>
                        <h3 class="text-lg font-bold text-blue-900 mb-1">全体 修繕完了率</h3>
                        <p class="text-sm text-blue-700">A(全所属) + B(特定3課) の完了数 ÷ 分母合計</p>
                    </div>
                    <div class="flex items-end gap-4">
                        <div class="text-center">
                            <p class="text-sm text-slate-500 mb-1">完了数</p>
                            <p id="resTotalNum" class="text-2xl font-bold text-slate-700">0</p>
                        </div>
                        <div class="text-3xl font-light text-slate-300 pb-1">/</div>
                        <div class="text-center">
                            <p class="text-sm text-slate-500 mb-1">対象数</p>
                            <p id="resTotalDenom" class="text-2xl font-bold text-slate-700">0</p>
                        </div>
                        <div class="text-center bg-white rounded-lg px-4 py-2 shadow-sm border border-blue-100 ml-4">
                            <p id="resTotalRate" class="text-4xl font-black text-blue-600">0.0%</p>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                                <th class="py-3 px-4 font-medium">所属</th>
                                <th class="py-3 px-4 font-medium text-right">分母 (対象数)</th>
                                <th class="py-3 px-4 font-medium text-right">分子 (完了数)</th>
                                <th class="py-3 px-4 font-medium text-right bg-slate-100">完了率</th>
                            </tr>
                        </thead>
                        <tbody id="deptTableBody" class="text-slate-700 divide-y divide-slate-100"></tbody>
                    </table>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-200 text-right">
                    <button id="toggleDetailsBtn" class="flex items-center gap-2 text-sm text-slate-500 hover:text-slate-800 font-medium transition-colors ml-auto">
                        <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200" id="detailIcon"></i>
                        計算の内訳を表示する
                    </button>
                    <div id="detailsArea" class="hidden mt-4 grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                        <div class="bg-slate-50 rounded-lg p-4 text-sm border border-slate-200">
                            <h4 class="font-bold text-slate-700 mb-2">A: 10お困り事</h4>
                            <p>条件①: <span id="aCond1">0</span> / 条件②: <span id="aCond2">0</span> / 合計: <span id="aTotal">0</span></p>
                        </div>
                        <div class="bg-slate-50 rounded-lg p-4 text-sm border border-slate-200">
                            <h4 class="font-bold text-slate-700 mb-2">B: 25設備保証修繕</h4>
                            <p>条件①: <span id="bCond1">0</span> / 条件②: <span id="bCond2">0</span> / 合計: <span id="bTotal">0</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const state = { dataA: null, dataB: null, dataC: null };
        const targetDepartments = ["営業1課", "営業2課", "営業3課"];
        const targetReceptors = ["ネクストリング株式会社", "郡司唯", "岩越未夢", "後藤伊織", "石原稔子", "近藤素弘", "土橋正季", "合田美結"];

        window.addEventListener('load', () => {
            lucide.createIcons();
            const input = document.getElementById('baseMonth');
            const d = new Date();
            input.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;

            document.getElementById('fileA').addEventListener('change', (e) => handleFile(e, 'dataA', 'fileNameA'));
            document.getElementById('fileB').addEventListener('change', (e) => handleFile(e, 'dataB', 'fileNameB'));
            document.getElementById('fileC').addEventListener('change', (e) => handleFile(e, 'dataC', 'fileNameC'));

            document.getElementById('calcButton').addEventListener('click', () => {
                if (!state.dataA || !state.dataB || !state.dataC) {
                    alert('全てのファイルをアップロードしてください。');
                    return;
                }
                calculate();
            });

            document.getElementById('toggleDetailsBtn').addEventListener('click', () => {
                document.getElementById('detailsArea').classList.toggle('hidden');
                document.getElementById('detailIcon').classList.toggle('rotate-180');
            });
        });

        async function handleFile(e, key, nameId) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById(nameId).textContent = file.name;
            const data = await readExcel(file);
            state[key] = data;
        }

        function readExcel(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    resolve(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { cellDates: true }));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        const norm = (s) => String(s || '').replace(/\s+/g, '');
        const parseDate = (v) => {
            if (!v) return null;
            if (v instanceof Date) return v;
            if (typeof v === 'number') return new Date(Math.round((v - 25569) * 86400 * 1000));
            const d = new Date(v);
            return isNaN(d.getTime()) ? null : d;
        };

        function calculate() {
            const [y, m] = document.getElementById('baseMonth').value.split('-').map(Number);
            const curStart = new Date(y, m - 1, 1), curEnd = new Date(y, m, 0, 23, 59, 59);
            const preStart = new Date(y, m - 2, 1), preEnd = new Date(y, m - 1, 0, 23, 59, 59);
            const prePreEnd = new Date(y, m - 2, 0, 23, 59, 59);

            const isC1 = (r) => r && r >= preStart && r <= preEnd;
            const isC2 = (r, c) => r && c && r <= prePreEnd && c >= curStart && c <= curEnd;

            const res = {
                A: { total: 0, c1: 0, c2: 0, dept: { "営業1課": 0, "営業2課": 0, "営業3課": 0, "その他": 0 } },
                B: { total: 0, c1: 0, c2: 0, dept: { "営業1課": 0, "営業2課": 0, "営業3課": 0, "その他": 0 } },
                C: { total: 0, dept: { "営業1課": 0, "営業2課": 0, "営業3課": 0, "その他": 0 } }
            };

            state.dataC.forEach(row => {
                const no = String(row["受付番号"] || ""), dept = norm(row["所属"]), rec = norm(row["受付者"]);
                const target = targetDepartments.includes(dept) ? dept : "その他";
                if (no.startsWith("10")) { res.C.total++; res.C.dept[target]++; }
                else if (no.startsWith("25") && targetDepartments.includes(dept) && targetReceptors.includes(rec)) { res.C.total++; res.C.dept[dept]++; }
            });

            state.dataA.forEach(row => {
                const r = parseDate(row["受付日"]), c = parseDate(row["完了日"]), dept = targetDepartments.includes(norm(row["所属"])) ? norm(row["所属"]) : "その他";
                if (isC1(r)) { res.A.c1++; res.A.total++; res.A.dept[dept]++; }
                else if (isC2(r, c)) { res.A.c2++; res.A.total++; res.A.dept[dept]++; }
            });

            state.dataB.forEach(row => {
                const dept = norm(row["所属"]), rec = norm(row["受付者"]);
                if (!targetDepartments.includes(dept) || !targetReceptors.includes(rec)) return;
                const r = parseDate(row["受付日"]), c = parseDate(row["完了日"]);
                if (isC1(r)) { res.B.c1++; res.B.total++; res.B.dept[dept]++; }
                else if (isC2(r, c)) { res.B.c2++; res.B.total++; res.B.dept[dept]++; }
            });

            render(y, m, res);
        }

        function render(y, m, res) {
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('targetMonthDisplay').textContent = `${y}年${m}月`;
            document.getElementById('resTotalNum').textContent = (res.A.total + res.B.total).toLocaleString();
            document.getElementById('resTotalDenom').textContent = res.C.total.toLocaleString();
            document.getElementById('resTotalRate').textContent = `${(Math.floor(((res.A.total + res.B.total) / (res.C.total || 1)) * 1000) / 10).toFixed(1)}%`;

            const tbody = document.getElementById('deptTableBody');
            tbody.innerHTML = '';
            [...targetDepartments, "その他"].forEach(d => {
                const n = res.A.dept[d] + res.B.dept[d], den = res.C.dept[d];
                tbody.innerHTML += `<tr><td class="py-3 px-4 font-bold">${d}</td><td class="py-3 px-4 text-right">${den}</td><td class="py-3 px-4 text-right">${n}</td><td class="py-3 px-4 text-right font-bold bg-slate-50">${(Math.floor((n / (den || 1)) * 1000) / 10).toFixed(1)}%</td></tr>`;
            });

            document.getElementById('aCond1').textContent = res.A.c1;
            document.getElementById('aCond2').textContent = res.A.c2;
            document.getElementById('aTotal').textContent = res.A.total;
            document.getElementById('bCond1').textContent = res.B.c1;
            document.getElementById('bCond2').textContent = res.B.c2;
            document.getElementById('bTotal').textContent = res.B.total;
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
